<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliente Oculto — Valor Soluções Empresariais</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--valor-dark:#1a1a2e;--valor-gold:#c9a84c;--valor-gold-light:#e8c97a;--valor-gold-pale:#f5edd6;--valor-slate:#2d3748;--valor-mid:#4a5568;--valor-light:#718096;--valor-bg:#f8f6f0;--valor-white:#ffffff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--valor-bg);min-height:100vh}
.vl-header{background:var(--valor-dark);position:relative;overflow:hidden}
.vl-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--valor-gold) 0%,var(--valor-gold-light) 50%,var(--valor-gold) 100%)}
.vl-header-inner{display:flex;align-items:center;justify-content:space-between;padding:18px 28px}
.vl-brand{display:flex;align-items:center;gap:14px}
.vl-logo-mark{width:42px;height:42px;background:var(--valor-gold);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--valor-dark);letter-spacing:-1px}
.vl-brand-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:#fff;letter-spacing:.5px}
.vl-brand-sub{font-size:10px;color:var(--valor-gold);text-transform:uppercase;letter-spacing:2px;font-weight:500}
.vl-tool-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--valor-gold);text-align:right}
.vl-tool-sub{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;text-align:right}
.vl-progress-bar{height:2px;background:rgba(255,255,255,.1)}
.vl-progress-fill{height:100%;background:var(--valor-gold);width:0%;transition:width .4s ease}
.vl-steps-nav{background:var(--valor-dark);display:flex;align-items:center;padding:0 28px 16px;gap:4px;overflow-x:auto}
.vl-step-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;color:rgba(255,255,255,.4);border:1px solid transparent;flex-shrink:0}
.vl-step-pill.active{background:var(--valor-gold);color:var(--valor-dark)}
.vl-step-pill.done{color:var(--valor-gold);border-color:rgba(201,168,76,.3)}
.vl-step-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;background:rgba(255,255,255,.1)}
.vl-step-pill.active .vl-step-num{background:rgba(26,26,46,.3)}
.vl-step-pill.done .vl-step-num{background:rgba(201,168,76,.2)}
.vl-main{padding:24px 28px;max-width:860px;margin:0 auto}
.vl-section-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px}
.vl-section-icon{width:44px;height:44px;flex-shrink:0;background:var(--valor-dark);display:flex;align-items:center;justify-content:center;font-size:20px}
.vl-section-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--valor-dark);line-height:1.2}
.vl-section-desc{font-size:12px;color:var(--valor-light);margin-top:3px;line-height:1.4}
.vl-card{background:var(--valor-white);border:1px solid #e2d9c0;border-radius:2px;margin-bottom:12px;overflow:hidden}
.vl-card-label{padding:14px 16px 10px;font-size:13px;font-weight:600;color:var(--valor-slate);border-bottom:1px solid #f0ebe0;display:flex;justify-content:space-between;align-items:center}
.vl-card-body{padding:14px 16px}
.vl-rating-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.vl-opt{padding:7px 14px;border:1px solid #d4c9a8;border-radius:2px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--valor-mid);transition:all .15s;line-height:1;font-family:'DM Sans',sans-serif}
.vl-opt:hover{border-color:var(--valor-gold);color:var(--valor-dark)}
.vl-opt.sel{background:var(--valor-dark);border-color:var(--valor-dark);color:var(--valor-gold);font-weight:600}
.vl-opt.sel-crit{background:#fff5f5;border-color:#c53030;color:#c53030}
.vl-opt.sel-warn{background:#fffbf0;border-color:#b7791f;color:#b7791f}
.vl-opt.sel-good{background:#f0fff4;border-color:#276749;color:#276749}
.vl-opt.sel-best{background:var(--valor-dark);border-color:var(--valor-gold);color:var(--valor-gold)}
.vl-field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.vl-field{display:flex;flex-direction:column;gap:5px}
.vl-field label{font-size:11px;font-weight:600;color:var(--valor-mid);text-transform:uppercase;letter-spacing:.8px}
.vl-field input,.vl-field select,.vl-field textarea{padding:8px 10px;border:1px solid #d4c9a8;border-radius:2px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--valor-dark);background:var(--valor-white);outline:none;transition:border-color .15s}
.vl-field input:focus,.vl-field select:focus,.vl-field textarea:focus{border-color:var(--valor-gold)}
.vl-score-badge{display:inline-flex;align-items:center;background:var(--valor-gold-pale);border:1px solid var(--valor-gold);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;color:var(--valor-dark)}
.vl-textarea{width:100%;min-height:80px;resize:vertical}
.vl-score-panel{background:var(--valor-dark);padding:20px 24px;border-radius:2px;margin-bottom:20px;position:relative;overflow:hidden}
.vl-score-panel::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border:2px solid rgba(201,168,76,.15);border-radius:50%}
.vl-score-grid{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center}
.vl-big-num{font-family:'Playfair Display',serif;font-size:56px;font-weight:700;color:var(--valor-gold);line-height:1}
.vl-big-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}
.vl-big-concept{font-size:14px;font-weight:600;margin-top:6px;padding:4px 12px;border-radius:20px;display:inline-block}
.concept-critico{background:#7f1d1d;color:#fca5a5}
.concept-regular{background:#78350f;color:#fcd34d}
.concept-bom{background:#1e3a5f;color:#93c5fd}
.concept-excelente{background:#14532d;color:#86efac}
.vl-dim-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.vl-dim-name{font-size:11px;color:rgba(255,255,255,.6);width:110px;flex-shrink:0}
.vl-dim-bar-bg{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.vl-dim-bar-fill{height:100%;border-radius:2px;background:var(--valor-gold);transition:width .5s ease}
.vl-dim-score{font-size:11px;font-weight:600;color:var(--valor-gold);width:28px;text-align:right}
.vl-insight{background:var(--valor-white);border:1px solid #e2d9c0;border-left:3px solid var(--valor-gold);padding:16px;border-radius:2px;margin-bottom:20px}
.vl-insight-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--valor-gold);margin-bottom:8px}
.vl-insight-body{font-size:13px;color:var(--valor-mid);line-height:1.6}
.vl-action-item{display:flex;gap:8px;margin-top:6px;font-size:12px;color:var(--valor-slate);align-items:flex-start}
.vl-action-bullet{color:var(--valor-gold);font-weight:600;flex-shrink:0}
.vl-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:20px;border-top:1px solid #e2d9c0}
.vl-btn{padding:10px 22px;border:1px solid var(--valor-dark);background:transparent;color:var(--valor-dark);font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .15s;font-family:'DM Sans',sans-serif}
.vl-btn:hover{background:var(--valor-dark);color:var(--valor-gold)}
.vl-btn-primary{background:var(--valor-dark);color:var(--valor-gold);border-color:var(--valor-dark)}
.vl-btn-primary:hover{background:#0d0d1a}
.vl-btn-gold{background:var(--valor-gold);color:var(--valor-dark);border-color:var(--valor-gold)}
.vl-btn-gold:hover{background:var(--valor-gold-light)}
.vl-type-selector{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:20px}
.vl-type-card{padding:14px 10px;border:1px solid #d4c9a8;border-radius:2px;text-align:center;cursor:pointer;transition:all .15s;background:var(--valor-white)}
.vl-type-card:hover{border-color:var(--valor-gold)}
.vl-type-card.sel{border-color:var(--valor-gold);background:var(--valor-gold-pale)}
.vl-type-icon{font-size:22px;margin-bottom:6px}
.vl-type-label{font-size:11px;font-weight:600;color:var(--valor-slate)}
.vl-divider{height:1px;background:#e8e0cc;margin:16px 0}
.vl-footer{background:var(--valor-dark);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;margin-top:32px}
.vl-footer-brand{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px}
.vl-footer-contact{font-size:10px;color:rgba(255,255,255,.3)}
.vl-footer-contact span{color:var(--valor-gold)}
.vl-seg{display:inline-block;padding:3px 10px;background:var(--valor-dark);color:var(--valor-gold);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:20px;margin-left:6px}
@media(max-width:600px){.vl-main{padding:16px}.vl-field-row{grid-template-columns:1fr}.vl-score-grid{grid-template-columns:1fr}.vl-header-inner{padding:14px 16px}.vl-big-num{font-size:44px}.vl-steps-nav{padding:0 16px 12px}}
</style>
</head>
<body>
<div id="app">
  <div class="vl-header">
    <div class="vl-header-inner">
      <div class="vl-brand">
        <div class="vl-logo-mark">V</div>
        <div>
          <div class="vl-brand-name">Valor Soluções Empresariais</div>
          <div class="vl-brand-sub">Organizar para crescer</div>
        </div>
      </div>
      <div>
        <div class="vl-tool-name">Cliente Oculto</div>
        <div class="vl-tool-sub">Plataforma de Avaliação</div>
      </div>
    </div>
    <div class="vl-progress-bar"><div class="vl-progress-fill" id="progressFill"></div></div>
  </div>
  <div class="vl-steps-nav" id="stepsNav"></div>
  <div class="vl-main" id="mainContent"></div>
  <div class="vl-footer">
    <div class="vl-footer-brand">© Valor Soluções Empresariais — @ricardopintovalor</div>
    <div class="vl-footer-contact"><span>www.valorsolucoes.com.br</span></div>
  </div>
</div>
<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz15YpK6eGen-0QRS1KJl4x0YvcbD2Qt3_hdqABm3Jczo97SAl5L-u2BO4Gne7WDToPfQ/exec"; // Cole aqui a URL do Google Apps Script após o deploy

const STEPS=[{id:'identificacao',label:'Identificação',icon:'📋'},{id:'previsita',label:'Pré-visita',icon:'📞'},{id:'chegada',label:'Chegada',icon:'🚪'},{id:'atendimento',label:'Atendimento',icon:'🤝'},{id:'execucao',label:'Serviço',icon:'⚙️'},{id:'ambiente',label:'Ambiente',icon:'🏪'},{id:'retencao',label:'Retenção',icon:'🔄'},{id:'digital',label:'Digital',icon:'📱'},{id:'resultado',label:'Resultado',icon:'📊'}];

const PESOS={previsita:10,chegada:10,atendimento:25,execucao:25,ambiente:10,retencao:15,digital:5};

function getColorClass(s){if(s>=85)return'concept-excelente';if(s>=70)return'concept-bom';if(s>=50)return'concept-regular';return'concept-critico'}
function getConceito(s){if(s>=85)return'EXCELENTE';if(s>=70)return'BOM';if(s>=50)return'REGULAR';return'CRÍTICO'}

function calcSection(sec){const v=Object.values(state.scores[sec]);if(!v.length)return 0;return Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)}
